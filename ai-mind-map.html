<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Ecosystem Mind Map</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0d1117;
  color: #e2e8f0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  display: flex;
  height: 100vh;
  overflow: hidden;
}
#graph-container { flex: 1; position: relative; overflow: hidden; }
svg { width: 100%; height: 100%; }

/* ── Panel ─────────────────────────────────────────────────────── */
#panel {
  width: 340px; min-width: 340px;
  background: #161b27;
  border-left: 1px solid #1e2d3d;
  display: flex; flex-direction: column; overflow: hidden;
}
#panel-hint {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 100%;
  color: #3d4f61; font-size: 13px; text-align: center; gap: 10px; padding: 24px;
}
#panel-hint svg { opacity: 0.3; }
#panel-content { padding: 24px; overflow-y: auto; flex: 1; display: none; }
#panel-header { margin-bottom: 16px; }
#panel-category {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.12em; margin-bottom: 6px;
}
#panel-name { font-size: 20px; font-weight: 700; line-height: 1.25; margin-bottom: 10px; }
#panel-status {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 3px 10px; border-radius: 99px; font-size: 11px; font-weight: 600;
}
#panel-divider { height: 1px; background: #1e2d3d; margin: 16px 0; }
#panel-summary { font-size: 14px; line-height: 1.7; color: #8ba3bd; margin-bottom: 16px; }

.psec { margin-bottom: 18px; }
.psec-title {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.1em; color: #3d4f61; margin-bottom: 7px;
}
.psec-body { font-size: 13px; line-height: 1.65; color: #8ba3bd; }

/* Rating control */
#rating-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 18px;
}
.rating-label { font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.1em; color: #3d4f61; flex-shrink: 0; }
.rating-dots { display: flex; gap: 5px; }
.rating-dot {
  width: 22px; height: 22px; border-radius: 50%;
  border: 2px solid #2a3f55; cursor: pointer;
  background: transparent; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 700; color: transparent;
}
.rating-dot:hover { border-color: #4a6580; transform: scale(1.1); }
.rating-dot.active { color: #0d1117; }
.rating-caption {
  font-size: 11px; color: #4a5568; margin-left: 4px; font-style: italic;
}

.qa-item {
  background: #1a2332; border: 1px solid #1e2d3d;
  border-radius: 8px; padding: 12px 14px; margin-bottom: 8px;
}
.qa-q { font-size: 12px; font-weight: 600; color: #90cdf4; margin-bottom: 6px; line-height: 1.4; }
.qa-a { font-size: 12px; color: #8ba3bd; line-height: 1.6; }

.notes-box {
  background: #1a2332; border: 1px solid #2a3f55;
  border-left: 3px solid; border-radius: 6px;
  padding: 10px 12px; font-size: 12px; line-height: 1.6; color: #8ba3bd;
}

/* ── Legend ─────────────────────────────────────────────────────── */
#legend {
  position: absolute; bottom: 20px; left: 20px;
  background: rgba(22,27,39,0.94); border: 1px solid #1e2d3d;
  border-radius: 10px; padding: 12px 16px; backdrop-filter: blur(8px);
}
.legend-title {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.1em; color: #3d4f61; margin-bottom: 8px;
}
.legend-sep { height: 1px; background: #1e2d3d; margin: 9px 0 8px; }
.legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; font-size: 11px; color: #8ba3bd; }
.legend-swatch { width: 13px; height: 13px; border-radius: 50%; border: 3px solid; flex-shrink: 0; }
.legend-fill-row { display: flex; align-items: center; gap: 4px; margin-bottom: 4px; }
.legend-fill-dot {
  width: 13px; height: 13px; border-radius: 50%; border: 2px solid #3d5a6e; flex-shrink: 0;
}

/* Hint bar */
#hint-bar {
  position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
  background: rgba(22,27,39,0.85); border: 1px solid #1e2d3d;
  border-radius: 99px; padding: 5px 14px; font-size: 11px; color: #3d4f61;
  pointer-events: none; white-space: nowrap; backdrop-filter: blur(6px);
}

/* D3 */
.link { fill: none; stroke-opacity: 0.3; }
.node { cursor: pointer; }
.node text { pointer-events: none; user-select: none; }
</style>
</head>

      { id:"acp-context-rot", name:"Context Rot", level:2, status:"should-know", category:"Augmented Coding", learned:0,
        summary:"Obstacle: As a conversation grows, earlier context degrades — the model 'forgets' or de-emphasizes things you established early on. Long sessions produce worse results than fresh ones.",

        questions:[], notes:"" },
      { id:"acp-obedient-contractor", name:"Obedient Contractor", level:2, status:"should-know", category:"Augmented Coding", learned:0,
        summary:"Obstacle: The AI does exactly what you say, not what you mean. It's a very capable contractor that won't push back or flag when your instructions lead somewhere bad.",
        whyKnow:"Explains why you can get technically-correct-but-wrong output. The solution is to be precise in your intent, not just your instruction — and to ask the AI to sanity-check before executing.",

      // ANTI-PATTERNS
      { id:"acp-ai-slop", name:"AI Slop", level:2, status:"should-know", category:"Augmented Coding", learned:0,
        summary:"Anti-pattern: Accepting low-quality AI output without critical review — verbose boilerplate, unnecessary complexity, or code that technically works but is wrong for the context.",
        whyKnow:"The AI always produces something, and it always sounds confident. Learning to spot slop — and developing the taste to reject it — is a core skill.",

      { id:"acp-flying-blind", name:"Flying Blind", level:2, status:"should-know", category:"Augmented Coding", learned:0,
        summary:"Anti-pattern: Using AI output without understanding it. You ship code you can't explain, debug, or maintain. The AI becomes a black box.",

      { id:"acp-silent-misalignment", name:"Silent Misalignment", level:2, status:"should-know", category:"Augmented Coding", learned:0,
        summary:"Anti-pattern: The AI appears to be doing the right thing but has subtly misunderstood the goal. Output looks correct on the surface but fails in non-obvious ways.",
        whyKnow:"Harder to catch than obvious errors. Mitigation: Check Alignment pattern — periodically ask the AI to restate what it thinks you're trying to accomplish.",

      { id:"acp-ground-rules", name:"Ground Rules", level:2, status:"should-know", category:"Augmented Coding", learned:0,
        summary:"Pattern: Establish explicit constraints and preferences at the start of a session or in a persistent CLAUDE.md/rules file — coding style, what not to do, how to handle uncertainty.",

// ─── FLATTEN ─────────────────────────────────────────────────────────────────

function flatten(node, parentId = null) {
  const me = { ...node, parentId, _childIds: (node.children||[]).map(c=>c.id) };
  delete me.children;
  const results = [me];
  (node.children||[]).forEach(child => results.push(...flatten(child, node.id)));
  return results;
}

const ALL_NODES = flatten(TREE);
const NODE_MAP  = new Map(ALL_NODES.map(n=>[n.id,n]));

// Learned ratings stored separately so they persist across re-renders
const learnedMap = new Map(ALL_NODES.map(n=>[n.id, n.learned||0]));

// Positions persist across renders
const positions = new Map();

// Which L1 nodes are expanded
const expanded = new Set();

// ─── HELPERS ─────────────────────────────────────────────────────────────────

function nodeRadius(d) {
  if (d.level===0) return 38;
  if (d.level===1) return 22;
  return 14;
}

function nodeColor(d) {
  if (d.level===0) return "#e2e8f0";
  return CAT_COLOR[d.category]||"#6366f1";
}

function statusRingColor(d) { return STATUS[d.status]?.ring||"#6366f1"; }

function learnedFill(d) {
  const l = learnedMap.get(d.id)||0;
  if (d.level===0) return `rgba(226,232,240,${l*0.06+0.04})`;
  const hex = FILL_OPX[l];
  return nodeColor(d)+hex;
}

function visibleNodes() {
  return ALL_NODES.filter(n => {
    if (n.level===0||n.level===1) return true;
    if (n.level===2 && expanded.has(n.parentId)) return true;
    return false;
  });
}

// ─── RENDER ──────────────────────────────────────────────────────────────────

const svgEl   = d3.select("#svg");
const gMain   = svgEl.append("g").attr("class","main");
let sim, selected = null;

const W = () => document.getElementById("graph-container").clientWidth;
const H = () => document.getElementById("graph-container").clientHeight;

// Zoom
const zoom = d3.zoom().scaleExtent([0.2,3.5])
  .on("zoom", e => gMain.attr("transform", e.transform));
svgEl.call(zoom);
svgEl.on("dblclick.zoom", null);

function render() {
  const nodes = visibleNodes().map(n => {
    const pos = positions.get(n.id);
    return { ...n, x: pos?.x??W()/2, y: pos?.y??H()/2, vx:0, vy:0 };
  });
  const nodeById = new Map(nodes.map(n=>[n.id,n]));

  const links = nodes
    .filter(n => n.parentId && nodeById.has(n.parentId))
    .map(n => ({ source: nodeById.get(n.parentId), target: n }));

  if (sim) sim.stop();

  sim = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links).id(d=>d.id)
      .distance(d => d.source.level===0 ? 175 : 115).strength(0.85))
    .force("charge", d3.forceManyBody().strength(d =>
      d.level===0 ? -1000 : d.level===1 ? -450 : -220))
    .force("center", d3.forceCenter(W()/2, H()/2))
    .force("collision", d3.forceCollide(d => nodeRadius(d)+24));

  // ── Links ──
  gMain.selectAll(".link-layer").remove();
  const linkLayer = gMain.append("g").attr("class","link-layer");
  const linkSel = linkLayer.selectAll("line").data(links).join("line")
    .attr("class","link")
    .attr("stroke", d => nodeColor(d.source))
    .attr("stroke-width", d => d.source.level===0 ? 2 : 1.5);

  // ── Nodes ──
  gMain.selectAll(".node-layer").remove();
  const nodeLayer = gMain.append("g").attr("class","node-layer");

  const nodeSel = nodeLayer.selectAll(".node").data(nodes,d=>d.id).join("g")
    .attr("class","node")
    .call(d3.drag()
      .on("start",(e,d)=>{ if(!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on("drag", (e,d)=>{ d.fx=e.x; d.fy=e.y; })
      .on("end",  (e,d)=>{ if(!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; })
    )
    .on("click", (e,d) => {
      e.stopPropagation();
      if (d.level===1) {
        if (expanded.has(d.id)) expanded.delete(d.id);
        else expanded.add(d.id);
      }
      selected = d.id;
      showPanel(d);
      render();
    });

  // Selected glow
  nodeSel.append("circle")
    .attr("r", d=>nodeRadius(d)+12)
    .attr("fill", d=>nodeColor(d))
    .attr("opacity", d=>selected===d.id ? 0.13 : 0)
    .style("pointer-events","none");

  // Status ring — thick and visible
  nodeSel.append("circle")
    .attr("r", d=>nodeRadius(d)+5)
    .attr("fill","none")
    .attr("stroke", d => d.level===0 ? "#e2e8f0" : statusRingColor(d))
    .attr("stroke-width", 4)
    .attr("stroke-dasharray", d => d.status==="watch" ? "6,4" : "none")
    .attr("opacity", 0.75)
    .style("pointer-events","none");

  // Main circle (learned-based fill)
  nodeSel.append("circle")
    .attr("r", nodeRadius)
    .attr("fill", learnedFill)
    .attr("stroke", nodeColor)
    .attr("stroke-width", d=>d.level===0 ? 2.5 : 2);

  // Q&A count badge in center
  nodeSel.filter(d=>d.questions?.length>0)
    .append("text")
    .attr("text-anchor","middle").attr("dy","0.35em")
    .attr("font-size", d=>d.level===0?13:10).attr("font-weight",700)
    .attr("fill",d=>nodeColor(d)).attr("opacity",0.85)
    .text(d=>d.questions.length);

  // Expand indicator dot
  nodeSel.filter(d=>d.level===1 && d._childIds.length>0)
    .append("circle")
    .attr("r", 5)
    .attr("cx", d=>nodeRadius(d)-1).attr("cy", d=>-(nodeRadius(d)-1))
    .attr("fill", d=>expanded.has(d.id) ? statusRingColor(d) : "#2a3f55")
    .attr("stroke","#0d1117").attr("stroke-width",1.5)
    .style("pointer-events","none");

  // Labels
  nodeSel.each(function(d) {
    const g = d3.select(this);
    const r = nodeRadius(d);
    const words = d.name.split(" ");
    const t = g.append("text")
      .attr("text-anchor","middle")
      .attr("font-size", d.level===0?13:d.level===1?11.5:10)
      .attr("font-weight", d.level<=1?600:400)
      .attr("fill", d.level===0?"#e2e8f0":nodeColor(d))
      .attr("opacity",0.9);
    if (words.length===1) {
      t.append("tspan").attr("x",0).attr("dy",r+14).text(d.name);
    } else if (words.length===2) {
      t.append("tspan").attr("x",0).attr("dy",r+14).text(words[0]);
      t.append("tspan").attr("x",0).attr("dy",13).text(words[1]);
    } else {
      const mid = Math.ceil(words.length/2);
      t.append("tspan").attr("x",0).attr("dy",r+14).text(words.slice(0,mid).join(" "));
      t.append("tspan").attr("x",0).attr("dy",13).text(words.slice(mid).join(" "));
    }
  });

  // Tick
  sim.on("tick", () => {
    linkSel
      .attr("x1",d=>d.source.x).attr("y1",d=>d.source.y)
      .attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
    nodeSel.attr("transform",d=>`translate(${d.x},${d.y})`);
    nodes.forEach(n=>positions.set(n.id,{x:n.x,y:n.y}));
  });
}

// ─── PANEL ───────────────────────────────────────────────────────────────────

let currentPanelNode = null;

function showPanel(d) {
  currentPanelNode = d;
  document.getElementById("panel-hint").style.display = "none";
  document.getElementById("panel-content").style.display = "block";

  const color = nodeColor(d);

  const catEl = document.getElementById("panel-category");
  catEl.textContent = d.level===0 ? "Overview" : d.category;
  catEl.style.color = d.level===0 ? "#8ba3bd" : color;

  const nameEl = document.getElementById("panel-name");
  nameEl.textContent = d.name;
  nameEl.style.color = d.level===0 ? "#e2e8f0" : color;

  const s = STATUS[d.status]||STATUS["core"];
  const stEl = document.getElementById("panel-status");
  stEl.textContent = s.label;
  stEl.style.background = s.bg;
  stEl.style.color = s.text;
  stEl.style.border = `1px solid ${s.ring}50`;

  document.getElementById("panel-summary").textContent = d.summary;

  // Rating
  renderRating(d, color);

  // Why
  const whySec = document.getElementById("sec-why");
  if (d.whyKnow) {
    whySec.style.display = "block";
    document.getElementById("panel-why").textContent = d.whyKnow;
  } else { whySec.style.display = "none"; }

  // Q&A
  const qaSec = document.getElementById("sec-qa");
  if (d.questions?.length) {
    qaSec.style.display = "block";
    document.getElementById("panel-qa").innerHTML = d.questions.map(qa=>
      `<div class="qa-item"><div class="qa-q">Q: ${qa.q}</div><div class="qa-a">${qa.a}</div></div>`
    ).join("");
  } else { qaSec.style.display = "none"; }

  // Notes
  const notesSec = document.getElementById("sec-notes");
  if (d.notes) {
    notesSec.style.display = "block";
    document.getElementById("panel-notes").innerHTML =
      `<div class="notes-box" style="border-left-color:${color}">${d.notes}</div>`;
  } else { notesSec.style.display = "none"; }
}

function renderRating(d, color) {
  const current = learnedMap.get(d.id)||0;
  const dots = document.getElementById("rating-dots");
  const caption = document.getElementById("rating-caption");
  caption.textContent = RATING_CAPTIONS[current];

  dots.innerHTML = "";
  for (let i=1; i<=5; i++) {
    const dot = document.createElement("div");
    dot.className = "rating-dot" + (i<=current?" active":"");
    dot.style.borderColor = i<=current ? color : "#2a3f55";
    dot.style.background  = i<=current ? color : "transparent";
    dot.title = RATING_CAPTIONS[i];
    dot.addEventListener("click", () => {
      const newVal = i===current ? i-1 : i; // click same rating to go down
      learnedMap.set(d.id, newVal);
      renderRating(d, color);
      render(); // update node fill
    });
    dots.appendChild(dot);
  }
}

// Deselect on background click
svgEl.on("click", () => {
  selected = null;
  document.getElementById("panel-hint").style.display = "flex";
  document.getElementById("panel-content").style.display = "none";
  render();
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();
window.addEventListener("resize", ()=>render());
</script>
